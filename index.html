<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>圓的基本性質 - 探究式遊戲</title>
    
    <!-- 引入 Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 與 ReactDOM (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel 用於在瀏覽器中編譯 JSX (CDN) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 基礎重置與防跳動設定 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 防止整體頁面捲動 */
            overscroll-behavior: none; /* 防止 Safari 邊緣回彈效果 */
            background-color: #f8fafc;
        }

        /* 隱藏滾動條的自訂樣式 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 防止雙擊放大干擾遊戲 */
        button { touch-action: manipulation; }

        /* 雙人對戰拔河動畫 (純左右拉扯) */
        @keyframes pull-left {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-8px); }
        }
        @keyframes pull-right {
            0%, 100% { transform: scaleX(-1) translateX(0); }
            50% { transform: scaleX(-1) translateX(-8px); }
        }
        .animate-pull-l { 
            animation: pull-left 0.6s ease-in-out infinite; 
        }
        .animate-pull-r { 
            animation: pull-right 0.6s ease-in-out infinite; 
        }

        /* 電影級倒數動畫 (Cinematic Countdown) */
        @keyframes cinematic-slam {
            0% { transform: scale(4); opacity: 0; filter: blur(10px); }
            20% { transform: scale(0.9); opacity: 1; filter: blur(0px); }
            40% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes shockwave-ring {
            0% { transform: scale(0.5); opacity: 0.8; border-width: 20px; }
            100% { transform: scale(3.5); opacity: 0; border-width: 0px; }
        }
        @keyframes go-flash {
            0% { opacity: 1; background-color: rgba(255, 255, 255, 1); }
            100% { opacity: 0; background-color: rgba(255, 255, 255, 0); }
        }
        .animate-cinematic { animation: cinematic-slam 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .animate-ring-1 { animation: shockwave-ring 0.8s ease-out forwards; border-color: rgba(239, 68, 68, 0.8); }
        .animate-ring-2 { animation: shockwave-ring 0.8s ease-out 0.1s forwards; border-color: rgba(250, 204, 21, 0.8); }
        .animate-go-flash { animation: go-flash 0.8s ease-out forwards; pointer-events: none; }

        /* 得分文字浮現動畫 */
        @keyframes fade-up-out {
            0% { opacity: 0; transform: translateY(10px) scale(0.9); }
            20% { opacity: 1; transform: translateY(0) scale(1.1); }
            30% { transform: scale(1); }
            80% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-20px) scale(1); }
        }
        .animate-float-msg { animation: fade-up-out 1.5s forwards ease-out; }
    </style>
</head>
<body>
    <div id="root" class="w-full h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Icons 組件 ---
        const Icon = ({ d, size = 24, className = "", children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {d ? <path d={d} /> : children}
            </svg>
        );
        const Play = (props) => <Icon {...props}><polygon points="6 3 20 12 6 21 6 3"/></Icon>;
        const Compass = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></Icon>;
        const Trophy = (props) => <Icon {...props}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 1.1-.9 2-2 2H4"/><path d="M14 14.66V17c0 1.1.9 2 2 2h4"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></Icon>;
        const Clock = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;
        const ChevronLeft = (props) => <Icon {...props}><polyline points="15 18 9 12 15 6"/></Icon>;
        const Check = (props) => <Icon {...props}><polyline points="20 6 9 17 4 12"/></Icon>;
        const X = (props) => <Icon {...props}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
        const MousePointer2 = (props) => <Icon {...props}><path d="M4.037 4.688a.495.495 0 0 1 .651-.651l16 6.5a.5.5 0 0 1-.063.947l-6.124 1.58a2 2 0 0 0-1.438 1.435l-1.579 6.126a.5.5 0 0 1-.947.063z"/></Icon>;
        const Users = (props) => <Icon {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>;
        const User = (props) => <Icon {...props}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></Icon>;

        // 拔河小人 SVG
        const TugPlayer = () => (
            <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" strokeWidth="8" strokeLinecap="round" strokeLinejoin="round" className="w-full h-full drop-shadow-md">
                <circle cx="50" cy="25" r="15" fill="currentColor" stroke="none" />
                <path d="M50 40 L50 70" />
                <path d="M50 48 L20 60" />
                <path d="M50 48 L85 60" />
                <path d="M50 70 L30 100" />
                <path d="M50 70 L75 100" />
            </svg>
        );

        // --- 幾何常數與輔助函數 ---
        const CX = 150, CY = 150, R = 120;

        const getPt = (th) => ({
            x: CX + R * Math.cos(th * Math.PI / 180),
            y: CY + R * Math.sin(th * Math.PI / 180)
        });

        const getAngle = (v, p1, p2) => {
            const a2 = Math.pow(p1.x - v.x, 2) + Math.pow(p1.y - v.y, 2);
            const b2 = Math.pow(p2.x - v.x, 2) + Math.pow(p2.y - v.y, 2);
            const c2 = Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2);
            if (a2 === 0 || b2 === 0) return 0;
            const cos = (a2 + b2 - c2) / (2 * Math.sqrt(a2) * Math.sqrt(b2));
            return Math.round(Math.acos(Math.max(-1, Math.min(1, cos))) * 180 / Math.PI);
        };

        // --- 色彩主題設定 ---
        const THEME_COLORS = {
            target: { fill: "#ef4444", stroke: "#b91c1c", text: "#ef4444", opacity: "0.35" }, // 紅色標示目標角
            center: { fill: "#c084fc", stroke: "#9333ea", text: "#0f172a", opacity: "0.4" },   
            circ1: { fill: "#fb923c", stroke: "#ea580c", text: "#0f172a", opacity: "0.4" },    
            circ2: { fill: "#4ade80", stroke: "#16a34a", text: "#0f172a", opacity: "0.4" },    
            default: { fill: "#38bdf8", stroke: "#0284c7", text: "#0f172a", opacity: "0.4" }   
        };

        const renderAngle = (v, p1, p2, label, isTarget, isRight = false, forceReflex = false, themeKey = 'default') => {
            let a1 = Math.atan2(p1.y - v.y, p1.x - v.x);
            let a2 = Math.atan2(p2.y - v.y, p2.x - v.x);

            const theme = isTarget ? THEME_COLORS.target : (THEME_COLORS[themeKey] || THEME_COLORS.default);

            if (isRight) {
                const size = 15;
                const v1x = p1.x - v.x, v1y = p1.y - v.y;
                const v2x = p2.x - v.x, v2y = p2.y - v.y;
                const len1 = Math.hypot(v1x, v1y), len2 = Math.hypot(v2x, v2y);
                const u1x = v1x / len1, u1y = v1y / len1;
                const u2x = v2x / len2, u2y = v2y / len2;
                const px1 = v.x + size * u1x, py1 = v.y + size * u1y;
                const px2 = v.x + size * (u1x + u2x), py2 = v.y + size * (u1y + u2y);
                const px3 = v.x + size * u2x, py3 = v.y + size * u2y;
                const path = `M ${v.x} ${v.y} L ${px1} ${py1} L ${px2} ${py2} L ${px3} ${py3} Z`;

                // 為了正確顯示 90度 直角標籤 (加入 x 顯示)
                let diff = a2 - a1;
                while (diff < 0) diff += 2 * Math.PI;
                let interiorAngle = Math.min(diff, 2 * Math.PI - diff);
                let startA = diff === interiorAngle ? a1 : a2;
                const bisector = startA + interiorAngle / 2;
                const lx = v.x + 35 * Math.cos(bisector);
                const ly = v.y + 35 * Math.sin(bisector) + 6;

                return (
                    <g key={`ang-${v.x}-${v.y}`}>
                        <path d={path} fill={theme.fill} opacity={isTarget ? "0.4" : "0.3"} className={isTarget ? "animate-pulse" : ""} />
                        <path d={path} fill="none" stroke={theme.stroke} strokeWidth={isTarget ? "3" : "2"} />
                        {label && (
                            <text x={lx} y={ly} textAnchor="middle" fill={isTarget ? "#ef4444" : theme.text} stroke={isTarget ? "#ffffff" : "none"} strokeWidth={isTarget ? "1.5" : "0"} 
                                  className={`font-black ${isTarget ? 'text-3xl md:text-4xl animate-pulse drop-shadow-[0_1px_3px_rgba(255,255,255,1)]' : 'text-lg md:text-md'}`}>
                                {label}
                            </text>
                        )}
                    </g>
                );
            }

            let diff = a2 - a1;
            while (diff < 0) diff += 2 * Math.PI;
            while (diff >= 2 * Math.PI) diff -= 2 * Math.PI;

            let interiorAngle = Math.min(diff, 2 * Math.PI - diff);
            let isCCW = diff === interiorAngle;

            let startA, endA, largeArc;
            if (forceReflex) {
                largeArc = 1;
                if (isCCW) { startA = a2; endA = a1 + 2 * Math.PI; } 
                else { startA = a1; endA = a2 + 2 * Math.PI; }
            } else {
                largeArc = 0;
                if (isCCW) { startA = a1; endA = a1 + diff; } 
                else { startA = a2; endA = a2 + (2 * Math.PI - diff); }
            }

            const absDiff = forceReflex ? (2 * Math.PI - interiorAngle) : interiorAngle;
            const radius = isTarget ? 30 : 25;
            const x1 = v.x + radius * Math.cos(startA);
            const y1 = v.y + radius * Math.sin(startA);
            const x2 = v.x + radius * Math.cos(endA);
            const y2 = v.y + radius * Math.sin(endA);

            const path = `M ${v.x} ${v.y} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2} Z`;
            const bisector = startA + absDiff / 2;
            const lx = v.x + (radius + (isTarget ? 22 : 18)) * Math.cos(bisector);
            const ly = v.y + (radius + (isTarget ? 22 : 18)) * Math.sin(bisector) + 6;

            return (
                <g key={`ang-${v.x}-${v.y}`}>
                    <path d={path} fill={theme.fill} opacity={theme.opacity} className={isTarget ? "animate-pulse" : ""} />
                    <path d={path} fill="none" stroke={theme.stroke} strokeWidth={isTarget ? "3" : "2"} />
                    {label && (
                        <text x={lx} y={ly} textAnchor="middle" fill={isTarget ? "#ef4444" : theme.text} stroke={isTarget ? "#ffffff" : "none"} strokeWidth={isTarget ? "1.5" : "0"} 
                              className={`font-black ${isTarget ? 'text-3xl md:text-4xl animate-pulse drop-shadow-[0_1px_3px_rgba(255,255,255,1)]' : 'text-lg md:text-md'}`}>
                            {label}
                        </text>
                    )}
                </g>
            );
        };

        const THEOREMS = [
            { id: 1, name: "圓心角兩倍於圓周角", en: "angle at centre twice angle at circumference" },
            { id: 2, name: "同弓形內的圓周角", en: "angles in same segment" },
            { id: 3, name: "半圓上的圓周角", en: "angle in semi-circle" }
        ];

        const THEOREM_LABELS = {
            1: { zh: "圓心角兩倍於圓周角", en: "angle at centre twice angle at circumference" },
            2: { zh: "同弓形內的圓周角", en: "angles in same segment" },
            3: { zh: "半圓上的圓周角", en: "angle in semi-circle" },
            4: { zh: "圓內接四邊形對角", en: "opposite angles, cyclic quad" } 
        };

        // --- Shared Geometry View Component ---
        const GeometryView = ({ type, mode, thetas, setThetas, question, showAnswer }) => {
            const svgRef = useRef(null);
            const [draggedPt, setDraggedPt] = useState(null);

            const pts = {
                A: type === 3 ? getPt(180) : getPt(thetas.A), 
                B: type === 3 ? getPt(0) : getPt(thetas.B),
                P: getPt(thetas.P), Q: getPt(thetas.Q),
                O: { x: CX, y: CY }
            };

            const startDrag = (id, e) => {
                if (mode !== 'explore') return;
                e.stopPropagation();
                setDraggedPt(id);
            };

            const onPointerMove = (e) => {
                if (!draggedPt) return;
                const svg = svgRef.current;
                const pt = svg.createSVGPoint();
                pt.x = e.clientX;
                pt.y = e.clientY;
                const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
                let angle = Math.atan2(svgP.y - CY, svgP.x - CX) * 180 / Math.PI;
                if (angle < 0) angle += 360;

                setThetas(prev => ({ ...prev, [draggedPt]: angle }));
            };

            const onPointerUp = () => setDraggedPt(null);

            // 智能標籤邏輯：如果是考定理原因，完全不顯示任何度數和 x
            const getLabel = (id, actualValue) => {
                if (mode === 'explore') return `${actualValue}°`;
                if (question?.askReason) return null; // 考定理時，隱藏數字和未知數 x，只留高亮弧線
                
                if (question?.given && question.given[id] !== undefined) return `${question.given[id]}°`;
                if (question?.target === id) return showAnswer ? `x = ${question.answer}°` : "x"; 
                return null;
            };

            const isTarget = (id) => {
                if (mode === 'explore') return false;
                if (question?.askReason) return question.highlights && question.highlights.includes(id);
                return (mode === 'play' || mode === 'vs') && question?.target === id;
            };

            const renderDraggablePoint = (id) => (
                <g key={id} onPointerDown={(e) => startDrag(id, e)} className={mode === 'explore' ? 'cursor-grab active:cursor-grabbing' : ''}>
                    <circle cx={pts[id].x} cy={pts[id].y} r={24} fill="transparent" /> 
                    <circle cx={pts[id].x} cy={pts[id].y} r={6} fill={mode === 'explore' ? "#fff" : "#cbd5e1"} 
                            stroke={mode === 'explore' ? "#0ea5e9" : "none"} strokeWidth="2" />
                </g>
            );

            const thm1_P = getAngle(pts.P, pts.A, pts.B);
            const thm1_O = thm1_P * 2; 
            const thm2_P = getAngle(pts.P, pts.A, pts.B);
            const thm2_Q = thm2_P;     
            const thm3_A = getAngle(pts.A, pts.P, pts.B);
            const thm3_B = 90 - thm3_A;

            return (
                <div className="relative w-full h-full flex items-center justify-center">
                    <svg 
                        ref={svgRef} 
                        viewBox="0 0 300 300" 
                        className="w-full h-full max-h-[100%] max-w-full touch-none filter drop-shadow-xl"
                        style={{ maxWidth: '400px' }}
                        onPointerMove={onPointerMove}
                        onPointerUp={onPointerUp}
                        onPointerLeave={onPointerUp}
                    >
                        <circle cx={CX} cy={CY} r={R} fill="#ffffff" stroke="#cbd5e1" strokeWidth="3" />
                        <circle cx={CX} cy={CY} r={4} fill="#64748b" />

                        {type === 1 && (
                            <>
                                <path d={`M ${pts.P.x} ${pts.P.y} L ${pts.A.x} ${pts.A.y} L ${pts.O.x} ${pts.O.y} L ${pts.B.x} ${pts.B.y} L ${pts.P.x} ${pts.P.y}`} 
                                      fill="none" stroke="#334155" strokeWidth="2" strokeLinejoin="round" />
                                {renderAngle(pts.O, pts.A, pts.B, getLabel('O', mode === 'explore' ? thm1_O : question?.answer), isTarget('O'), false, (mode === 'explore' ? thm1_O : (question?.given?.O || question?.answer)) > 180, 'center')}
                                {renderAngle(pts.P, pts.A, pts.B, getLabel('P', mode === 'explore' ? thm1_P : question?.answer), isTarget('P'), false, false, 'circ1')}
                                {['A', 'B', 'P'].map(renderDraggablePoint)}
                            </>
                        )}

                        {type === 2 && (
                            <>
                                <path d={`M ${pts.P.x} ${pts.P.y} L ${pts.A.x} ${pts.A.y} L ${pts.Q.x} ${pts.Q.y} L ${pts.B.x} ${pts.B.y} Z`} 
                                      fill="none" stroke="#334155" strokeWidth="2" strokeLinejoin="round" />
                                <line x1={pts.A.x} y1={pts.A.y} x2={pts.B.x} y2={pts.B.y} stroke="#334155" strokeWidth="2" />
                                {renderAngle(pts.P, pts.A, pts.B, getLabel('P', mode === 'explore' ? thm2_P : question?.answer), isTarget('P'), false, false, 'circ1')}
                                {renderAngle(pts.Q, pts.A, pts.B, getLabel('Q', mode === 'explore' ? thm2_Q : question?.answer), isTarget('Q'), false, false, 'circ2')}
                                {['A', 'B', 'P', 'Q'].map(renderDraggablePoint)}
                            </>
                        )}

                        {type === 3 && (
                            <>
                                <polygon points={`${pts.A.x},${pts.A.y} ${pts.B.x},${pts.B.y} ${pts.P.x},${pts.P.y}`} 
                                         fill="none" stroke="#334155" strokeWidth="2" strokeLinejoin="round" />
                                <line x1={pts.A.x} y1={pts.A.y} x2={pts.B.x} y2={pts.B.y} stroke="#334155" strokeWidth="2" /> 
                                <circle cx={CX} cy={CY} r={4} fill="#334155" />
                                {renderAngle(pts.P, pts.A, pts.B, getLabel('P', 90), isTarget('P'), true, false, 'center')}
                                {renderAngle(pts.A, pts.P, pts.B, getLabel('A', mode === 'explore' ? thm3_A : question?.answer), isTarget('A'), false, false, 'circ1')}
                                {renderAngle(pts.B, pts.A, pts.P, getLabel('B', mode === 'explore' ? thm3_B : question?.answer), isTarget('B'), false, false, 'circ2')}
                                {['P'].map(renderDraggablePoint)}
                            </>
                        )}
                    </svg>

                    {/* 探究模式專屬：動態關係式面板 */}
                    {mode === 'explore' && (
                        <div className="absolute bottom-2 right-2 md:bottom-4 md:right-4 bg-slate-900/85 backdrop-blur-md text-white px-5 py-3 rounded-2xl shadow-xl border border-slate-700 pointer-events-none z-20">
                            {type === 1 && (
                                <div className="text-right">
                                    <div className="text-xs md:text-sm text-slate-400 font-bold mb-1 tracking-wider uppercase">x = 2y</div>
                                    <div className="text-xl md:text-2xl font-black">
                                        <span className="text-[#c084fc] drop-shadow-[0_0_8px_rgba(192,132,252,0.5)]">{thm1_O}°</span> 
                                        <span className="mx-2 text-slate-300">=</span> 
                                        <span className="text-slate-300">2 ×</span> 
                                        <span className="text-[#fb923c] drop-shadow-[0_0_8px_rgba(251,146,60,0.5)] ml-1">{thm1_P}°</span>
                                    </div>
                                </div>
                            )}
                            {type === 2 && (
                                <div className="text-right">
                                    <div className="text-xs md:text-sm text-slate-400 font-bold mb-1 tracking-wider uppercase">a = b</div>
                                    <div className="text-xl md:text-2xl font-black">
                                        <span className="text-[#fb923c] drop-shadow-[0_0_8px_rgba(251,146,60,0.5)]">{thm2_P}°</span> 
                                        <span className="mx-3 text-slate-300">=</span> 
                                        <span className="text-[#4ade80] drop-shadow-[0_0_8px_rgba(74,222,128,0.5)]">{thm2_Q}°</span>
                                    </div>
                                </div>
                            )}
                            {type === 3 && (
                                <div className="text-right">
                                    <div className="text-xs md:text-sm text-slate-400 font-bold mb-1 tracking-wider uppercase">∠ = 90°</div>
                                    <div className="text-xl md:text-2xl font-black">
                                        <span className="text-[#c084fc] drop-shadow-[0_0_8px_rgba(192,132,252,0.5)] tracking-widest">90°</span> 
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // --- Game Logic (Enhanced generation for all types) ---
        const generateQuestion = (type, isMixed = false) => {
            let q = { thetas: {}, given: {}, target: '', answer: 0, type, askReason: false, highlights: [] };

            let isReason = isMixed && Math.random() < 0.3;
            if (isReason) {
                q.askReason = true;
                q.answer = type;
                q.options = [1, 2, 3, 4]; 
            }

            if (type === 1) {
                let layoutType = Math.floor(Math.random() * 4); // 4 種款式
                let valP, valO, thA, thB, thP;
                thA = Math.floor(Math.random() * 360);

                if (layoutType === 0) { // 傳統箭頭形
                    valP = Math.floor(Math.random() * 45) + 25; 
                    valO = valP * 2;
                    thB = (thA + valO) % 360;
                    thP = (thA + valO / 2 + 180 + Math.floor(Math.random() * 80) - 40) % 360;
                } else if (layoutType === 1) { // 優角 (Reflex)
                    valP = Math.floor(Math.random() * 35) + 110; 
                    valO = valP * 2;
                    thB = (thA + valO) % 360;
                    thP = (thA + valO / 2 + 180 + Math.floor(Math.random() * 50) - 25) % 360;
                } else if (layoutType === 2) { // 交叉形 (P 靠近 A)
                    valP = Math.floor(Math.random() * 45) + 25; 
                    valO = valP * 2;
                    thB = (thA + valO) % 360;
                    thP = (thA - 20 - Math.floor(Math.random() * 40) + 360) % 360;
                } else { // 交叉形 (P 靠近 B)
                    valP = Math.floor(Math.random() * 45) + 25; 
                    valO = valP * 2;
                    thB = (thA + valO) % 360;
                    thP = (thB + 20 + Math.floor(Math.random() * 40)) % 360;
                }
                if (thP < 0) thP += 360;
                
                q.thetas = { A: thA, B: thB, P: thP };
                
                if (isReason) {
                    q.given = { P: valP, O: valO }; 
                    q.highlights = ['P', 'O'];      
                } else {
                    if (Math.random() > 0.5) { q.given = { P: valP }; q.target = 'O'; q.answer = valO; } 
                    else { q.given = { O: valO }; q.target = 'P'; q.answer = valP; }
                }
            } else if (type === 2) {
                let val = Math.floor(Math.random() * 40) + 25;
                let thA = Math.floor(Math.random() * 360);
                let thB = (thA + val * 2) % 360;
                let thP, thQ;
                
                if (Math.random() > 0.5) { // 傳統對稱
                    thP = (thB + 40 + Math.floor(Math.random() * 60)) % 360;
                    thQ = (thP + 40 + Math.floor(Math.random() * 60)) % 360;
                } else { // 交叉極端
                    thP = (thB + 15 + Math.floor(Math.random() * 30)) % 360;
                    thQ = (thA - 15 - Math.floor(Math.random() * 30) + 360) % 360;
                }
                
                q.thetas = { A: thA, B: thB, P: thP, Q: thQ };
                if (isReason) {
                    q.given = { P: val, Q: val };
                    q.highlights = ['P', 'Q'];
                } else {
                    if (Math.random() > 0.5) { q.given = { P: val }; q.target = 'Q'; q.answer = val; } 
                    else { q.given = { Q: val }; q.target = 'P'; q.answer = val; }
                }
            } else if (type === 3) {
                let valA = Math.floor(Math.random() * 60) + 15;
                let valB = 90 - valA;
                let thP = 180 + 2 * valB;
                q.thetas = { A: 180, B: 0, P: thP };
                
                if (isReason) {
                    q.given = { P: 90 };
                    q.highlights = ['P'];
                } else {
                    let askType = Math.floor(Math.random() * 3);
                    if (askType === 0) { 
                        q.given = { A: valA }; q.target = 'B'; q.answer = valB; 
                    } else if (askType === 1) { 
                        q.given = { B: valB }; q.target = 'A'; q.answer = valA; 
                    } else { 
                        if (Math.random() > 0.5) q.given = { A: valA };
                        else q.given = { B: valB };
                        q.target = 'P'; q.answer = 90;
                    }
                }
            }

            if (!isReason) {
                let opts = new Set([q.answer]);
                while (opts.size < 4) {
                    let dist = q.answer + (Math.floor(Math.random() * 4) + 1) * 10 * (Math.random() > 0.5 ? 1 : -1);
                    if (Math.random() > 0.7) dist = 180 - q.answer;
                    else if (Math.random() > 0.8) dist = 90 - q.answer;
                    else if (Math.random() > 0.9) dist = q.answer * 2;
                    if (dist > 0 && dist < 360) opts.add(dist);
                }
                q.options = Array.from(opts).sort(() => Math.random() - 0.5);
            }
            
            return q;
        };

        const getNextQuestionType = (mode) => {
            if (mode === 0) return Math.floor(Math.random() * 3) + 1; 
            if (mode === 4) return Math.random() > 0.5 ? 1 : 3;       
            return mode; 
        };

        // --- Main App Component ---
        function App() {
            const [view, setView] = useState('HOME'); 
            const [challengeMode, setChallengeMode] = useState('single'); 
            const [activeThm, setActiveThm] = useState(1);
            const [playModeThm, setPlayModeThm] = useState(0);
            const [exploreThetas, setExploreThetas] = useState({ A: 45, B: 135, P: 270, Q: 315 });
            
            const [countdownVal, setCountdownVal] = useState(3);
            const [pendingView, setPendingView] = useState('PLAY');
            const [pendingGameType, setPendingGameType] = useState(0);

            const [score, setScore] = useState(0);
            const [combo, setCombo] = useState(0);
            const [timeLeft, setTimeLeft] = useState(0);
            const [question, setQuestion] = useState(null);
            const [feedback, setFeedback] = useState(null);

            const [tugPosition, setTugPosition] = useState(0); 
            const [p1Lock, setP1Lock] = useState(false);
            const [p2Lock, setP2Lock] = useState(false);
            const [revealCorrect, setRevealCorrect] = useState(false);
            const [lastScorer, setLastScorer] = useState(null);

            // 新增：儲存錯題與回顧進度的 State
            const [wrongQuestions, setWrongQuestions] = useState([]);
            const [reviewIndex, setReviewIndex] = useState(0);

            useEffect(() => {
                let timer;
                if ((view === 'PLAY' || view === 'VS_PLAY') && timeLeft > 0 && !feedback && !revealCorrect) {
                    timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                } else if ((view === 'PLAY' || view === 'VS_PLAY') && timeLeft === 0 && !feedback && !revealCorrect) {
                    setView(view === 'PLAY' ? 'OVER' : 'VS_OVER');
                }
                return () => clearInterval(timer);
            }, [view, timeLeft, feedback, revealCorrect]);

            useEffect(() => {
                let timer;
                if (view === 'COUNTDOWN') {
                    if (countdownVal > 0) {
                        timer = setTimeout(() => setCountdownVal(prev => prev - 1), 1000);
                    } else {
                        timer = setTimeout(() => {
                            setPlayModeThm(pendingGameType);
                            const isMixed = pendingGameType === 0 || pendingGameType === 4;
                            if (pendingView === 'PLAY') {
                                setScore(0);
                                setCombo(0);
                                setTimeLeft(30);
                                setQuestion(generateQuestion(getNextQuestionType(pendingGameType), isMixed));
                                setView('PLAY');
                            } else {
                                setTugPosition(0);
                                setTimeLeft(30); 
                                setQuestion(generateQuestion(getNextQuestionType(pendingGameType), isMixed)); 
                                setP1Lock(false);
                                setP2Lock(false);
                                setRevealCorrect(false);
                                setLastScorer(null);
                                setView('VS_PLAY');
                            }
                        }, 800); 
                    }
                }
                return () => clearTimeout(timer);
            }, [view, countdownVal, pendingView, pendingGameType]);

            const startCountdown = (targetView, type) => {
                setPendingView(targetView);
                setPendingGameType(type);
                setCountdownVal(3);
                setView('COUNTDOWN');
            };

            const startGame = (type) => {
                const isMixed = type === 0 || type === 4;
                setPlayModeThm(type);
                setScore(0);
                setCombo(0);
                setTimeLeft(30);
                setQuestion(generateQuestion(getNextQuestionType(type), isMixed));
                setFeedback(null);
                setRevealCorrect(false);
                setWrongQuestions([]); // 開始新遊戲時清空錯題
                setReviewIndex(0);
                setView('PLAY'); // 單人模式直接進入遊戲，跳過倒數
            };

            const startVsGame = (type) => {
                setPlayModeThm(type);
                setTugPosition(0);
                setTimeLeft(30); 
                const isMixed = type === 0 || type === 4;
                setQuestion(generateQuestion(getNextQuestionType(type), isMixed)); 
                setP1Lock(false);
                setP2Lock(false);
                setRevealCorrect(false);
                setLastScorer(null);
                setView('VS_PLAY');
            };

            const handleGuess = (val) => {
                if (feedback || revealCorrect) return;
                const correct = val === question.answer;
                if (correct) {
                    setScore(s => s + 10 + combo * 5);
                    setCombo(c => c + 1);
                    setRevealCorrect(true);
                    setTimeout(() => {
                        setRevealCorrect(false);
                        const isMixed = playModeThm === 0 || playModeThm === 4;
                        setQuestion(generateQuestion(getNextQuestionType(playModeThm), isMixed));
                    }, 500); // 0.5秒冷卻時間
                } else {
                    setFeedback('wrong');
                    setCombo(0);
                    // 答錯時，將該題加入錯題本（若尚未加入）
                    setWrongQuestions(prev => {
                        if (!prev.some(q => q === question)) {
                            return [...prev, question];
                        }
                        return prev;
                    });
                }
            };

            const handleVsGuess = (player, val) => {
                if (player === 1 && p1Lock) return;
                if (player === 2 && p2Lock) return;
                if (revealCorrect) return;

                const correct = val === question.answer;

                if (correct) {
                    const newTug = player === 1 ? tugPosition - 1 : tugPosition + 1;
                    setTugPosition(newTug);
                    
                    setRevealCorrect(true);
                    setP1Lock(true);
                    setP2Lock(true);
                    setLastScorer(player);

                    setTimeout(() => {
                        if (newTug <= -5 || newTug >= 5) {
                            setView('VS_OVER');
                        } else {
                            const isMixed = playModeThm === 0 || playModeThm === 4;
                            setQuestion(generateQuestion(getNextQuestionType(playModeThm), isMixed));
                            setRevealCorrect(false);
                            setP1Lock(false);
                            setP2Lock(false);
                            setLastScorer(null);
                        }
                    }, 1500);
                } else {
                    const newTug = player === 1 ? tugPosition + 1 : tugPosition - 1;
                    setTugPosition(newTug);
                    
                    if (newTug <= -5 || newTug >= 5) {
                        setView('VS_OVER');
                        return;
                    }

                    if (player === 1) {
                        setP1Lock(true);
                        setTimeout(() => setP1Lock(false), 1000); 
                    } else {
                        setP2Lock(true);
                        setTimeout(() => setP2Lock(false), 1000); 
                    }
                }
            };

            // 新增：處理重溫模式的作答
            const handleReviewGuess = (val) => {
                if (feedback || revealCorrect) return;
                const currentQ = wrongQuestions[reviewIndex];
                const correct = val === currentQ.answer;

                if (correct) {
                    setRevealCorrect(true);

                        setRevealCorrect(false);
                        if (reviewIndex + 1 < wrongQuestions.length) {
                            setReviewIndex(prev => prev + 1);
                        } else {
                            // 錯題全部重溫完畢
                            setWrongQuestions([]);
                            setView('OVER');
                        }

                    setFeedback('wrong');
                }

                    case 2: return <><span className="block mb-2 font-black text-2xl md:text-3xl">同弓形內的圓周角</span><span className="text-blue-600/80 text-lg md:text-xl font-bold">angles in same segment</span></>;
                    case 3: return <><span className="block mb-2 font-black text-2xl md:text-3xl">半圓上的圓周角</span><span className="text-blue-600/80 text-lg md:text-xl font-bold">angle in semi-circle</span></>;
                    default: return "";
                }
            };

            // 支援動態傳入 currentQ，以便在錯題回顧時使用
            const renderOptionContent = (opt, isCorrect, currentQ = question) => {
                if (revealCorrect && !isCorrect) return ""; 
                
                if (currentQ.askReason) {
                    const label = THEOREM_LABELS[opt];
                    return (
                        <div className="flex flex-col items-center justify-center p-1 space-y-0.5 md:space-y-1 w-full">
                            <span className="text-base md:text-xl lg:text-2xl font-black leading-tight text-center px-1">{label.zh}</span>
                            <span className="text-[0.65rem] md:text-sm lg:text-base font-bold opacity-90 leading-tight tracking-tight text-center px-1">{label.en}</span>
                        </div>
                    );
                } else {
                    return `${opt}°`;
                }
            };

            return (
                <div className="fixed inset-0 bg-slate-50 text-slate-800 font-sans selection:bg-blue-200 overflow-hidden flex flex-col h-[100dvh]">
                    
                    {/* --- COUNTDOWN (電影級特效) --- */}
                    {view === 'COUNTDOWN' && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center overflow-hidden bg-slate-950/90 backdrop-blur-md">
                            <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,transparent_0%,rgba(0,0,0,0.9)_100%)]"></div>

                            <div key={countdownVal} className="relative flex items-center justify-center w-full h-full">
                                <div className="absolute w-32 h-32 md:w-64 md:h-64 rounded-full animate-ring-1 border-solid"></div>
                                <div className="absolute w-32 h-32 md:w-64 md:h-64 rounded-full animate-ring-2 border-solid"></div>
                                
                                <div className="animate-cinematic text-[200px] md:text-[300px] font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-white via-yellow-300 to-red-600 drop-shadow-[0_20px_50px_rgba(220,38,38,0.8)] z-10" style={{WebkitTextStroke: '2px rgba(255,255,255,0.3)'}}>
                                    {countdownVal > 0 ? countdownVal : "GO!"}
                                </div>
                            </div>

                            {countdownVal === 0 && (
                                <div className="absolute inset-0 animate-go-flash z-50"></div>
                            )}
                        </div>
                    )}

                    {view === 'HOME' && (
                        <div className="flex-1 flex flex-col items-center justify-center p-6 text-center space-y-8 md:space-y-10 min-h-0 overflow-y-auto">
                            <div className="space-y-4">
                                <div className="inline-block p-4 bg-blue-100 rounded-full mb-2 md:mb-4 ring-1 ring-blue-200 shadow-sm">
                                    <Compass size={56} className="text-blue-500 md:w-16 md:h-16" />
                                </div>
                                <h1 className="text-4xl md:text-5xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-br from-blue-600 to-indigo-600 drop-shadow-sm mb-2">
                                    圓的基本性質
                                </h1>
                                <h2 className="text-xl md:text-2xl font-bold text-slate-500">Circle Properties</h2>
                            </div>
                            <div className="flex flex-col sm:flex-row gap-4 w-full max-w-lg pb-4">
                                <button onClick={() => setView('EXPLORE')} className="flex-1 group relative p-1 rounded-2xl bg-gradient-to-b from-white to-slate-100 hover:from-blue-50 hover:to-blue-100 border border-slate-200 shadow-sm transition-all active:scale-95">
                                    <div className="px-6 py-4 md:py-5 flex items-center justify-center gap-3">

                                    <div className="bg-white/20 px-8 py-8 md:px-10 md:py-12 rounded-[1.75rem] flex flex-col items-center justify-center backdrop-blur-sm gap-4">
                                        <Users className="text-white drop-shadow-md w-16 h-16 md:w-20 md:h-20" />
                                        <span className="text-3xl md:text-4xl font-black text-white drop-shadow-md tracking-wider">雙人拔河對戰</span>
                                        <span className="text-orange-100 font-bold text-xl uppercase">1v1 VS Mode</span>

                                </button>
                            </div>
                        </div>
                    )}

                    {view === 'TOPIC_SELECT' && (
                        <div className="flex-1 flex flex-col max-w-2xl w-full mx-auto p-4 md:p-8 h-full overflow-y-auto hide-scrollbar">
                            <header className="flex items-center mb-6 md:mb-10 flex-shrink-0">
                                <button onClick={() => setView('MODE_SELECT')} className="p-2 hover:bg-slate-200 text-slate-600 rounded-lg transition-colors">
                                    <ChevronLeft size={36} className="md:w-10 md:h-10" />

                                <h2 className="text-3xl md:text-4xl font-bold flex-1 text-center pr-10 md:pr-12 text-pink-600">選擇挑戰主題 <span className="text-xl md:text-2xl text-pink-400 font-semibold block mt-1">Topic Selection</span></h2>

                                <button onClick={() => challengeMode === 'single' ? startGame(0) : startCountdown('VS_PLAY', 0)} className={`w-full p-1 rounded-3xl bg-gradient-to-r hover:scale-[1.02] transition-transform shadow-lg ${challengeMode === 'single' ? 'from-pink-500 to-purple-500 shadow-pink-500/20' : 'from-orange-400 to-red-500 shadow-orange-500/20'}`}>
                                    <div className="bg-white/20 px-6 py-5 md:px-8 md:py-6 rounded-[22px] flex items-center justify-between backdrop-blur-sm">
                                        <span className="text-2xl md:text-3xl font-black text-white drop-shadow-sm">綜合挑戰 (All Mixed)</span>
                                        {challengeMode === 'single' ? <Trophy className="text-yellow-300 drop-shadow-sm w-8 h-8 md:w-10 md:h-10" /> : <Users className="text-white drop-shadow-sm w-8 h-8 md:w-10 md:h-10" />}
                                    </div>

                                <button onClick={() => challengeMode === 'single' ? startGame(4) : startCountdown('VS_PLAY', 4)} className={`w-full p-1 rounded-3xl bg-gradient-to-r hover:scale-[1.02] transition-transform shadow-lg ${challengeMode === 'single' ? 'from-teal-400 to-emerald-500 shadow-teal-500/20' : 'from-yellow-400 to-amber-500 shadow-yellow-500/20'}`}>
                                    <div className="bg-white/20 px-6 py-5 md:px-8 md:py-6 rounded-[22px] flex items-center justify-between backdrop-blur-sm">
                                        <div className="flex flex-col text-left">
                                            <span className="text-2xl md:text-3xl font-black text-white drop-shadow-sm">混合：圓心角 & 半圓角</span>

                                        </div>
                                        {challengeMode === 'single' ? <Trophy className="text-yellow-300 drop-shadow-sm w-8 h-8 md:w-10 md:h-10" /> : <Users className="text-white drop-shadow-sm w-8 h-8 md:w-10 md:h-10" />}
                                    </div>
                                </button>

                                <div className="h-1 bg-slate-200 my-4 md:my-6 rounded-full" />
                                
                                {THEOREMS.map(t => (
                                    <button key={t.id} onClick={() => challengeMode === 'single' ? startGame(t.id) : startCountdown('VS_PLAY', t.id)} className="w-full text-left px-6 py-4 md:px-8 md:py-6 rounded-3xl bg-white hover:bg-slate-50 border-2 border-slate-200 shadow-sm transition-colors flex justify-between items-center group">
                                        <div className="flex flex-col">
                                            <span className="text-xl md:text-2xl font-bold text-slate-700 group-hover:text-blue-600 transition-colors mb-1">{t.name}</span>

                        </div>
                    )}

                    {view === 'EXPLORE' && (
                        <div className="flex-1 flex flex-col max-w-6xl w-full mx-auto p-3 md:p-6 min-h-0 h-full">

                                <h2 className="text-4xl md:text-6xl font-black text-slate-800 mb-2 md:mb-4">時間到！</h2>
                                <p className="text-slate-500 text-lg md:text-2xl font-bold">你的最終得分 (Final Score)</p>
                                <div className="text-7xl md:text-9xl font-black text-transparent bg-clip-text bg-gradient-to-b from-blue-500 to-indigo-600 my-4 md:my-8 drop-shadow-sm">
                                    {score}
                                </div>
                            </div>
                            
                            <div className="flex flex-col sm:flex-row w-full max-w-3xl gap-4 md:gap-6 pb-4">
                                {wrongQuestions.length > 0 && (
                                    <button onClick={() => { setView('REVIEW'); setReviewIndex(0); setFeedback(null); setRevealCorrect(false); }} className="flex-1 py-4 md:py-6 rounded-3xl bg-orange-500 hover:bg-orange-600 text-white font-bold text-xl md:text-2xl transition-colors shadow-lg shadow-orange-500/30">
                                        重溫錯題 ({wrongQuestions.length})
                                    </button>
                                )}
                                <button onClick={() => startGame(playModeThm)} className="flex-1 py-4 md:py-6 rounded-3xl bg-blue-500 hover:bg-blue-600 text-white font-bold text-xl md:text-2xl transition-colors shadow-lg shadow-blue-500/30">
                                    再來一局 (Play Again)
                                </button>
                                <button onClick={() => setView('MODE_SELECT')} className="flex-1 py-4 md:py-6 rounded-3xl bg-white hover:bg-slate-50 border-2 border-slate-200 text-slate-700 font-bold text-xl md:text-2xl transition-colors shadow-sm">
                                    返回選單 (Menu)
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
